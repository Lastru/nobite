<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />

  <!-- Supporto iPhone / schermata Home -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="NoBite" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.json" />

  <title>NoBite</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="screen">
    <section class="card">
      <div class="pill">NoBite PWA</div>

      <h1>Hello World 👋</h1>
      <p class="subtitle">
        Mini app personale installabile su iPhone, con dati salvati localmente.
      </p>

      <div class="counter-box">
        <p class="label">Contatore salvato in IndexedDB</p>
        <output id="counter" class="counter">0</output>

        <div class="buttons">
          <button id="plus" type="button">+1</button>
          <button id="reset" type="button" class="secondary">Reset</button>
        </div>
      </div>

      <p id="status" class="status">Caricamento...</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
